<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabolario — Italian B2/C1</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --cream: #ede6d6;
    --rust: #b5451b;
    --gold: #c8972a;
    --sage: #5a7a5c;
    --mist: #8a9ba8;
    --card-shadow: 0 4px 24px rgba(26,18,8,0.12), 0 1px 4px rgba(26,18,8,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(26,18,8,0.04) 27px, rgba(26,18,8,0.04) 28px);
  }

  header {
    width: 100%;
    max-width: 680px;
    padding: 36px 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid rgba(26,18,8,0.15);
    margin-bottom: 40px;
  }

  .title-block h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }

  .title-block h1 em {
    font-style: italic;
    color: var(--rust);
  }

  .title-block .subtitle {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mist);
    margin-top: 4px;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--ink);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
  }

  .stat-divider {
    width: 1px;
    height: 32px;
    background: rgba(26,18,8,0.15);
  }

  /* Mode tabs */
  .mode-tabs {
    width: 100%;
    max-width: 680px;
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border: 1px solid rgba(26,18,8,0.18);
  }

  .tab-btn {
    flex: 1;
    padding: 10px 0;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mist);
    transition: all 0.2s;
    position: relative;
    touch-action: manipulation;
  }

  .tab-btn:not(:last-child) {
    border-right: 1px solid rgba(26,18,8,0.18);
  }

  .tab-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  .tab-btn .review-badge {
    display: inline-block;
    background: var(--rust);
    color: white;
    font-size: 0.55rem;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Card */
  .card-area {
    width: 100%;
    max-width: 680px;
  }

  .flashcard {
    background: white;
    box-shadow: var(--card-shadow);
    padding: 52px 48px 40px;
    position: relative;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    transition: opacity 0.25s;
  }

  .flashcard::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--rust);
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }

  .word-type {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mist);
  }

  .word-num {
    font-size: 0.6rem;
    color: var(--mist);
  }

  .italian-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.6rem;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 12px;
  }

  .pronunciation {
    font-size: 0.65rem;
    color: var(--mist);
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }

  .example-sentence {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: rgba(26,18,8,0.5);
    border-left: 2px solid var(--cream);
    padding-left: 16px;
    line-height: 1.6;
    flex: 1;
  }

  /* Input area */
  .answer-area {
    width: 100%;
    max-width: 680px;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .answer-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mist);
  }

  .answer-row {
    display: flex;
    gap: 0;
  }

  .answer-input {
    flex: 1;
    padding: 14px 20px;
    background: white;
    border: 1px solid rgba(26,18,8,0.2);
    border-right: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-input:focus {
    border-color: var(--ink);
  }

  .answer-input::placeholder {
    color: rgba(26,18,8,0.25);
    font-style: italic;
  }

  .submit-btn {
    padding: 14px 28px;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }

  .submit-btn:hover {
    background: var(--rust);
    border-color: var(--rust);
  }

  .submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Feedback panel */
  .feedback-panel {
    width: 100%;
    max-width: 680px;
    margin-top: 20px;
    padding: 28px 32px;
    background: white;
    box-shadow: var(--card-shadow);
    display: none;
    position: relative;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback-panel.visible { display: block; }

  .feedback-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .feedback-panel.correct::before { background: var(--sage); }
  .feedback-panel.incorrect::before { background: var(--rust); }
  .feedback-panel.partial::before { background: var(--gold); }

  .feedback-verdict {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .feedback-panel.correct .feedback-verdict { color: var(--sage); }
  .feedback-panel.incorrect .feedback-verdict { color: var(--rust); }
  .feedback-panel.partial .feedback-verdict { color: var(--gold); }

  .verdict-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .feedback-panel.correct .verdict-dot { background: var(--sage); }
  .feedback-panel.incorrect .verdict-dot { background: var(--rust); }
  .feedback-panel.partial .verdict-dot { background: var(--gold); }

  .feedback-explanation {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 20px;
  }

  .correct-answer-block {
    background: var(--cream);
    padding: 14px 18px;
    margin-bottom: 20px;
  }

  .correct-answer-block .ca-label {
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mist);
    margin-bottom: 4px;
  }

  .correct-answer-block .ca-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    color: var(--ink);
    font-weight: 600;
  }

  .next-btn {
    padding: 12px 32px;
    background: transparent;
    border: 1px solid var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
  }

  .next-btn:hover {
    background: var(--ink);
    color: var(--paper);
  }

  /* Review list */
  .review-list {
    width: 100%;
    max-width: 680px;
    display: none;
  }

  .review-list.visible { display: block; }

  .review-list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .review-list-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    font-style: italic;
  }

  .clear-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
    background: none;
    border: 1px solid rgba(26,18,8,0.15);
    padding: 6px 14px;
    cursor: pointer;
  }

  .clear-btn:hover { color: var(--rust); border-color: var(--rust); }

  .review-item {
    background: white;
    padding: 18px 24px;
    margin-bottom: 8px;
    box-shadow: 0 1px 4px rgba(26,18,8,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .review-item-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--ink);
  }

  .review-item-def {
    font-size: 0.7rem;
    color: var(--mist);
    margin-top: 2px;
  }

  .review-item-count {
    font-size: 0.6rem;
    color: var(--rust);
    letter-spacing: 0.1em;
  }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--mist);
  }

  .empty-state .es-icon {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem;
    font-style: italic;
    margin-bottom: 12px;
    display: block;
    color: rgba(26,18,8,0.15);
  }

  .empty-state .es-text {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Loading spinner */
  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 4px; height: 4px;
    background: var(--paper);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  .card-area.fading { opacity: 0; }

  /* Progress bar */
  .progress-track {
    width: 100%;
    max-width: 680px;
    height: 2px;
    background: rgba(26,18,8,0.1);
    margin-bottom: 24px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--rust);
    transition: width 0.4s ease;
  }

  /* ── Mobile ────────────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    body {
      padding: 0 12px 80px;
    }

    header {
      padding: 18px 0 14px;
      margin-bottom: 20px;
      align-items: center;
    }

    .title-block h1 {
      font-size: 1.9rem;
    }

    .title-block .subtitle {
      font-size: 0.58rem;
    }

    .stats-bar {
      gap: 10px;
    }

    .stat-num {
      font-size: 1.1rem;
    }

    .stat-label {
      font-size: 0.5rem;
    }

    .stat-divider {
      height: 24px;
    }

    .mode-tabs {
      margin-bottom: 16px;
    }

    .tab-btn {
      padding: 13px 0;
      font-size: 0.6rem;
    }

    .flashcard {
      padding: 28px 22px 22px;
      min-height: 200px;
    }

    .card-meta {
      margin-bottom: 16px;
    }

    .italian-word {
      font-size: 2.4rem;
      margin-bottom: 6px;
    }

    .pronunciation {
      margin-bottom: 16px;
    }

    .example-sentence {
      font-size: 1rem;
    }

    .answer-area {
      margin-top: 14px;
      gap: 8px;
    }

    .answer-row {
      flex-direction: column;
      gap: 8px;
    }

    .answer-input {
      border-right: 1px solid rgba(26,18,8,0.2);
      /* 16px prevents iOS auto-zoom on focus */
      font-size: 16px;
      padding: 14px 16px;
    }

    .submit-btn {
      width: 100%;
      padding: 15px;
      font-size: 0.65rem;
    }

    .feedback-panel {
      padding: 20px 18px;
      margin-top: 14px;
    }

    .feedback-explanation {
      font-size: 1rem;
    }

    .next-btn {
      width: 100%;
      padding: 14px;
      text-align: center;
    }

    .review-item {
      padding: 14px 16px;
    }

    .review-item-word {
      font-size: 1.2rem;
    }

    .progress-track {
      margin-bottom: 16px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1><em>Vocabolario</em></h1>
    <div class="subtitle">Italian B2 · C1 — Flashcards</div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="stat-correct">0</div>
      <div class="stat-label">Correct</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="stat-streak">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Tried</div>
    </div>
  </div>
</header>

<!-- Mode tabs -->
<div class="mode-tabs">
  <button class="tab-btn active" id="tab-learn" onclick="switchTab('learn')">Learn</button>
  <button class="tab-btn" id="tab-review" onclick="switchTab('review')">
    Review <span class="review-badge" id="review-badge" style="display:none">0</span>
  </button>
</div>

<!-- Progress bar -->
<div class="progress-track">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- LEARN MODE -->
<div class="card-area" id="learn-area">
  <div class="flashcard" id="flashcard">
    <div class="card-meta">
      <span class="word-type" id="word-type">loading...</span>
      <span class="word-num" id="word-num">#1</span>
    </div>
    <div class="italian-word" id="italian-word">—</div>
    <div class="pronunciation" id="pronunciation"></div>
    <div class="example-sentence" id="example-sentence" style="font-style:normal;color:var(--mist);font-size:0.75rem">Caricamento in corso…</div>
  </div>
</div>

<div class="answer-area" id="answer-area">
  <div class="answer-label">La tua risposta — What does this word mean?</div>
  <div class="answer-row">
    <input class="answer-input" id="answer-input" type="text" placeholder="Enter the English meaning…" autocomplete="off" />
    <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">
      Check
    </button>
  </div>
</div>

<div class="feedback-panel" id="feedback-panel">
  <div class="feedback-verdict">
    <span class="verdict-dot"></span>
    <span id="verdict-text">—</span>
  </div>
  <div class="feedback-explanation" id="feedback-explanation"></div>
  <div class="correct-answer-block" id="correct-answer-block" style="display:none">
    <div class="ca-label">Full meaning</div>
    <div class="ca-text" id="correct-answer-text"></div>
  </div>
  <button class="next-btn" onclick="nextCard()">Next word →</button>
</div>

<!-- REVIEW MODE -->
<div class="review-list" id="review-area">
  <div class="review-list-header">
    <span class="review-list-title">Parole da ripassare</span>
    <button class="clear-btn" onclick="clearReview()">Clear all</button>
  </div>
  <div id="review-items"></div>
</div>

<script>
// ── Word bank ────────────────────────────────────────────────────────────────
const wordBank = [
  { word: "avvilire", type: "verbo", pron: "av·vi·lí·re", example: "Le sue parole mi hanno avvilito profondamente." },
  { word: "soverchiare", type: "verbo", pron: "so·ver·chiá·re", example: "Le grandi imprese tendono a soverchiare le piccole." },

  { word: "il voltafaccia", type: "sostantivo", pron: "vol·ta·fác·cia", example: "Il suo voltafaccia politico deluse molti sostenitori." },

  { word: "l'inadempienza", type: "sostantivo", pron: "in·a·dem·piénza", example: "L'inadempienza contrattuale portò al processo." },

  { word: 'avvilire', type: 'verbo', pron: 'av·vi·lí·re', example: 'Le sue parole mi hanno avvilito profondamente.', difficulty: 'C' },

  { word: 'esercitare', type: 'verbo', pron: 'e·ser·ci·tà·re', example: 'Il direttore esercita una grande influenza sulle decisioni aziendali.', difficulty: 'B' },
  { word: 'interagire', type: 'verbo', pron: 'in·te·ra·gì·re', example: 'È importante interagire con persone di culture diverse per ampliare i propri orizzonti.', difficulty: 'B' },
  { word: 'la stanza dei bottoni', type: 'espressione', pron: 'la stàn·za dei bot·tó·ni', example: 'Per cambiare davvero le cose, bisogna entrare nella stanza dei bottoni.', difficulty: 'C' },
  { word: 'nocciola', type: 'sostantivo', pron: 'noc·ciò·la', example: 'Il gelato alla nocciola è il mio preferito in assoluto.', difficulty: 'A' },
  { word: 'riconnettersi', type: 'verbo', pron: 'ri·con·nèt·ter·si', example: 'Dopo la vacanza, ho avuto bisogno di qualche giorno per riconnettermi con la routine lavorativa.', difficulty: 'B' },
  { word: 'rivelare', type: 'verbo', pron: 'ri·ve·là·re', example: 'L\'inchiesta ha rivelato dettagli sorprendenti sulla vicenda.', difficulty: 'B' },
  { word: 'rivendicazione', type: 'sostantivo', pron: 'ri·ven·di·ca·zió·ne', example: 'I sindacati hanno presentato una lista di rivendicazioni al governo.', difficulty: 'C' },
  { word: 'riversare', type: 'verbo', pron: 'ri·ver·sà·re', example: 'Migliaia di tifosi si sono riversati nelle strade per festeggiare la vittoria.', difficulty: 'C' },
  { word: 'sfacelo', type: 'sostantivo', pron: 'sfa·cé·lo', example: 'La gestione improvvisata ha portato l\'azienda allo sfacelo totale.', difficulty: 'C' },
  { word: 'fattaccio', type: 'sostantivo', pron: 'fat·tàc·cio', example: 'In paese si parla ancora di quel fattaccio accaduto l\'estate scorsa.', difficulty: 'B' },
  { word: 'velleitario', type: 'aggettivo', pron: 'vel·lei·tà·rio', example: 'Il suo progetto di aprire dieci negozi in un anno mi sembra un po\' velleitario.', difficulty: 'C' },
  { word: 'è disposto a tutto', type: 'espressione', pron: 'è di·spó·sto a tùt·to', example: 'Pur di vincere la gara, è disposto a tutto, anche a barare.', difficulty: 'B' },
  { word: 'appunto', type: 'avverbio', pron: 'ap·pùn·to', example: 'Non ti piace il freddo? Appunto per questo ti consiglio di non visitare l\'Islanda in inverno.', difficulty: 'A' },
];

// ── State ────────────────────────────────────────────────────────────────────
let queue = [];
let reviewQueue = {}; // word → { wordObj, missCount }
let currentWord = null;
let stats = { correct: 0, streak: 0, total: 0 };
let isReviewMode = false;
let isLoading = false;

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  queue = shuffle([...wordBank]);
  loadFromStorage();
  renderCard();
  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !isLoading) submitAnswer();
  });
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('vocabolario_review');
    if (saved) reviewQueue = JSON.parse(saved);
    const savedStats = localStorage.getItem('vocabolario_stats');
    if (savedStats) stats = JSON.parse(savedStats);
  } catch(e) {}
  updateStats();
  updateReviewBadge();
}

function saveToStorage() {
  try {
    localStorage.setItem('vocabolario_review', JSON.stringify(reviewQueue));
    localStorage.setItem('vocabolario_stats', JSON.stringify(stats));
  } catch(e) {}
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderCard() {
  if (isReviewMode) {
    const reviewWords = Object.values(reviewQueue);
    if (reviewWords.length === 0) {
      currentWord = null;
      return;
    }
    // pick highest miss count first
    reviewWords.sort((a, b) => b.missCount - a.missCount);
    currentWord = reviewWords[0].wordObj;
  } else {
    if (queue.length === 0) queue = shuffle([...wordBank]);
    // skip words already mastered (not in review) with slight bias
    currentWord = queue.shift();
  }

  document.getElementById('italian-word').textContent = currentWord.word;
  document.getElementById('word-type').textContent = currentWord.type;
  document.getElementById('pronunciation').textContent = `/${currentWord.pron}/`;
  document.getElementById('example-sentence').innerHTML = `<em>${currentWord.example}</em>`;
  document.getElementById('word-num').textContent = `#${stats.total + 1}`;

  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').disabled = false;
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('feedback-panel').className = 'feedback-panel';
  document.getElementById('answer-input').focus();
}

function updateStats() {
  document.getElementById('stat-correct').textContent = stats.correct;
  document.getElementById('stat-streak').textContent = stats.streak;
  document.getElementById('stat-total').textContent = stats.total;
  const pct = stats.total > 0 ? Math.min(100, (stats.correct / stats.total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateReviewBadge() {
  const count = Object.keys(reviewQueue).length;
  const badge = document.getElementById('review-badge');
  if (count > 0) {
    badge.style.display = 'inline-block';
    badge.textContent = count;
  } else {
    badge.style.display = 'none';
  }
}

// ── Answer checking ───────────────────────────────────────────────────────────
async function submitAnswer() {
  const userAnswer = document.getElementById('answer-input').value.trim();
  if (!userAnswer || isLoading) return;

  isLoading = true;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
  document.getElementById('answer-input').disabled = true;

  try {
    const response = await fetch("https://traduttore-proxy.justin-marsico.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json", "anthropic-version": "2023-06-01" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        system: `You are an Italian language tutor evaluating a student's understanding of Italian vocabulary at B2/C1 level. 
        
When given an Italian word and the student's attempted English translation, you must:
1. Judge if the answer is CORRECT, PARTIAL, or INCORRECT
2. Give a brief, encouraging explanation (2-3 sentences max)
3. Provide the accurate English definition

Respond ONLY with valid JSON, no markdown, no preamble:
{
  "verdict": "correct" | "partial" | "incorrect",
  "explanation": "...",
  "correctDefinition": "..."
}

Be generous with "correct" if the student captures the core meaning, even if not exact.
Be encouraging in tone. Note nuances or register where relevant.`,
        messages: [{
          role: "user",
          content: `Italian word: "${currentWord.word}" (${currentWord.type})
Example: "${currentWord.example}"
Student's answer: "${userAnswer}"

Evaluate this answer.`
        }]
      })
    });

    const data = await response.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '{}';
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    showFeedback(result, userAnswer);

  } catch(err) {
    showFeedback({
      verdict: 'incorrect',
      explanation: 'Could not connect to the API. Please check your connection.',
      correctDefinition: '—'
    }, userAnswer);
  }

  btn.disabled = false;
  btn.textContent = 'Check';
  isLoading = false;
}

function showFeedback(result, userAnswer) {
  const panel = document.getElementById('feedback-panel');
  panel.className = `feedback-panel visible ${result.verdict}`;

  const verdictMap = { correct: 'Esatto — Correct', partial: 'Parziale — Partially correct', incorrect: 'Errato — Incorrect' };
  document.getElementById('verdict-text').textContent = verdictMap[result.verdict] || result.verdict;
  document.getElementById('feedback-explanation').textContent = result.explanation;

  const caBlock = document.getElementById('correct-answer-block');
  if (result.verdict !== 'correct') {
    caBlock.style.display = 'block';
    document.getElementById('correct-answer-text').textContent = result.correctDefinition;
  } else {
    caBlock.style.display = 'none';
  }

  stats.total++;
  if (result.verdict === 'correct') {
    stats.correct++;
    stats.streak++;
    // remove from review if mastered
    if (reviewQueue[currentWord.word]) {
      reviewQueue[currentWord.word].missCount--;
      if (reviewQueue[currentWord.word].missCount <= 0) {
        delete reviewQueue[currentWord.word];
      }
    }
  } else {
    stats.streak = 0;
    // add to review queue
    if (reviewQueue[currentWord.word]) {
      reviewQueue[currentWord.word].missCount++;
    } else {
      reviewQueue[currentWord.word] = { wordObj: currentWord, missCount: 1 };
    }
  }

  updateStats();
  updateReviewBadge();
  saveToStorage();
}

function nextCard() {
  const card = document.getElementById('card-area') || document.getElementById('learn-area');
  card.classList.add('fading');
  setTimeout(() => {
    renderCard();
    card.classList.remove('fading');
  }, 250);
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');

  if (tab === 'learn') {
    isReviewMode = false;
    document.getElementById('learn-area').style.display = '';
    document.getElementById('answer-area').style.display = '';
    document.getElementById('review-area').className = 'review-list';
    document.getElementById('feedback-panel').className = 'feedback-panel';
    renderCard();
  } else {
    isReviewMode = true;
    document.getElementById('learn-area').style.display = 'none';
    document.getElementById('answer-area').style.display = 'none';
    document.getElementById('feedback-panel').className = 'feedback-panel';
    document.getElementById('review-area').className = 'review-list visible';
    renderReviewList();
  }
}

function renderReviewList() {
  const container = document.getElementById('review-items');
  const words = Object.values(reviewQueue);
  if (words.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <span class="es-icon">✓</span>
      <div class="es-text">No words to review — great work!</div>
    </div>`;
    return;
  }
  words.sort((a, b) => b.missCount - a.missCount);
  container.innerHTML = words.map(({ wordObj, missCount }) => `
    <div class="review-item">
      <div>
        <div class="review-item-word">${wordObj.word}</div>
        <div class="review-item-def">${wordObj.type} · <em>${wordObj.pron}</em></div>
      </div>
      <div class="review-item-count">missed ${missCount}×</div>
    </div>
  `).join('');
}

function clearReview() {
  if (confirm('Clear all words from the review list?')) {
    reviewQueue = {};
    saveToStorage();
    renderReviewList();
    updateReviewBadge();
  }
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>

</html>
